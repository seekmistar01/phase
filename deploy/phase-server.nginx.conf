upstream phase_server {
    server 127.0.0.1:9374;
}

server {
    listen 80;
    server_name _; # Replace with your domain if you add one

    location /ws {
        proxy_pass http://phase_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Discord card-bot (separate container on :9375). The trailing slash on
    # proxy_pass strips the /card-bot/ prefix, so Discord's configured endpoint
    # https://<host>/card-bot/interactions reaches the bot as POST /interactions.
    location /card-bot/ {
        proxy_pass http://127.0.0.1:9375/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass http://phase_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
